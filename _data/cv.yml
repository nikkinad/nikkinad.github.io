    Publications:
      - title: Microbial Genome Analysis in Coastal Environments & Microbial Observatory Science Outreach Module (MOSOM) Development
        timeframe: 2023 – 2024
        authors:
          - Nikki Nadarevic and Affan Uzir
        publisher: "Bielawski Research Group, Institute For Comparitive Genomics, Supervisor: Dr. Joseph Bielawski"
        releaseDate: 2024
        url: https://en.wikisource.org/wiki/Translation:On_the_Electrodynamics_of_Moving_Bodies
        summary:
          - Multi-part microbiome research project investigating environmental drivers of coastal microbial community composition while addressing limitations of traditional sampling approaches and promoting inclusive citizen science engagement
          - Contributed to analysis of environmental microbiome datasets collected from the Harrison Lewis Coastal Discovery Centre in collaboration with Dalhousie's Institute for Comparative Genomics, the Hakai Institute, and the Integrated Microbiome Resource (IMR)
          - Supported microbial DNA extraction and full-length 16S/18S rDNA PacBio amplicon sequencing to characterize both prokaryotic and eukaryotic microbial communities
          - Analyzed microbiome datasets consisting of metadata, taxonomic classifications, and amplicon sequence variant (ASV) count tables to investigate microbial community structure
          - Conducted biodiversity and statistical analyses including Principal Component Analysis (PCA), Poisson PCA (PPCA), and alpha/beta diversity metrics to identify ecological drivers of microbial community variation
          - Identified statistically significant relationships between microbial composition and environmental factors, using a team-developed R/Shiny-NGS biodiversity analysis platform to visualize microbial community clustering
          - Led development of open-source "Microbial Microscape" educational modules hosted on GitHub that guide users through microbiome data analysis workflows including dataset preparation, statistical testing, and ecological interpretation
          - Designed tutorials enabling citizen scientists and high-school students to upload metadata, taxonomy, and sequence data files and independently conduct biodiversity analysis using the Shiny NGS platform to promote accessible, open-science participation in biodiversity research
          - Presented research findings at a scientific poster fair and virtually supported the rollout of Microbial Observatory Science Outreach Modules (MOSOMs) to high-school students in Halifax

